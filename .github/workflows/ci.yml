name: CI

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Tests ─────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test -p finstream-core --features alpaca,finnhub,massive,yahoo

  # ── Build matrix ──────────────────────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — musl (cross-compiled via Docker)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cargo: cross
            ext: ''

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cargo: cross
            ext: ''

          - target: i686-unknown-linux-musl
            os: ubuntu-latest
            cargo: cross
            ext: ''

          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cargo: cargo
            ext: .exe

          # macOS — native runners per architecture
          - target: x86_64-apple-darwin
            os: macos-13          # Intel runner
            cargo: cargo
            ext: ''

          - target: aarch64-apple-darwin
            os: macos-14          # Apple Silicon runner
            cargo: cargo
            ext: ''

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Install cross
        if: matrix.cargo == 'cross'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: ${{ matrix.cargo }} build -p finstream --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/finstream${{ matrix.ext }} \
             finstream-${{ matrix.target }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: finstream-${{ matrix.target }}
          path: finstream-${{ matrix.target }}${{ matrix.ext }}
          if-no-files-found: error

  # ── GitHub release (tags only) ────────────────────────────────────────────────
  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: ls -lh artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
